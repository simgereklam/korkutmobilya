<script>
const galeri = document.getElementById("galeri");

const images = [
  "banyo-dolaplari.1.png",
  "banyo-dolaplari.2.png",
  "banyo-dolaplari.3.png",
  "banyo-dolaplari.4.png",
  "banyo-dolaplari.5.png",
  "banyo-dolaplari.6.png",
  "banyo-dolaplari.7.png",
  "banyo-dolaplari.8.png",
  "banyo-dolaplari.9.png",
  "banyo-dolaplari.10.png",
  "banyo-dolaplari.11.png",
  "banyo-dolaplari.12.png",
  "banyo-dolaplari.13.png",
  "banyo-dolaplari.14.png",
  "banyo-dolaplari.15.png",
  "banyo-dolaplari.16.png",
  "banyo-dolaplari.17.png",
  "banyo-dolaplari.19.png",
  "banyo-dolaplari.20.png",
  "banyo-dolaplari.21.png"
];

let currentIndex = 0;

const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const counter = document.getElementById("counter");

images.forEach(function(src,index){
  galeri.innerHTML += `
    <a href="javascript:void(0)" onclick="openModal(${index})">
      <img src="${src}" alt="Korkut Mobilya Banyo Dolabı Modeli ${index + 1}">
    </a>
  `;
});

function openModal(index){
  currentIndex = index;
  updateModal();
  modal.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeModal(){
  modal.classList.remove("active");
  document.body.style.overflow = "auto";
}

function updateModal(){
  modalImg.src = images[currentIndex];
  counter.innerText = (currentIndex + 1) + " / " + images.length;
}

function nextImage(){
  currentIndex++;
  if(currentIndex >= images.length){currentIndex = 0;}
  updateModal();
}

function prevImage(){
  currentIndex--;
  if(currentIndex < 0){currentIndex = images.length - 1;}
  updateModal();
}

document.addEventListener("keydown",function(e){
  if(!modal.classList.contains("active")) return;
  if(e.key === "ArrowRight") nextImage();
  if(e.key === "ArrowLeft") prevImage();
  if(e.key === "Escape") closeModal();
});

let startX = 0;

modal.addEventListener("touchstart",function(e){
  startX = e.touches[0].clientX;
});

modal.addEventListener("touchend",function(e){
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if(Math.abs(diff) > 50){
    if(diff > 0){nextImage();}else{prevImage();}
  }
});

modal.addEventListener("click",function(e){
  if(e.target === modal){closeModal();}
});
</script>
